---
- name: 🚀 RackNerd VPS 企业级自动化部署
  hosts: racknerd
  become: true
  # 【⚠️ 核心架构警告】：切勿开启默认的 gather_facts！
  # 必须保持 gather_facts: false。这是为了防止在缺少 python3-dnf 的部分老旧系统中，
  # Ansible 会在第一步自动收集 facts 时就直接报错崩溃。我们需要先用 raw 模块修环境，再收集信息。
  gather_facts: false

  pre_tasks:
    - name: 智能探测目标主机的自定义 SSH 端口 (防 22 端口死锁)
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: "{{ ssh_port }}"
        timeout: 3
        state: started
      delegate_to: localhost
      register: custom_port_check
      failed_when: false
      changed_when: false
      check_mode: false

    - name: 动态设置实际连接端口 (根据探测结果 fallback 到 22)
      ansible.builtin.set_fact:
        ansible_port: "{% if 'Timeout' not in custom_port_check.msg | default('') %}{{ ssh_port }}{% else %}22{% endif %}"

    - name: Ensure Python 3 APT bindings are installed (fixes old Python issue on target)
      ansible.builtin.raw: "apt-get update && apt-get install -y python3-apt || true"
      changed_when: false
      failed_when: false

    # 【⚠️ 核心架构警告】：切勿删除此手动 setup 任务！
    # 因为我们在顶部禁用了默认的 gather_facts，所以必须在 python 基础环境准备好之后，
    # 显式地调用 setup 模块来收集系统信息（如 IP、系统版本等），否则后续的 Roles 会因缺少变量而报错。
    - name: Gather facts after python environment is ready
      ansible.builtin.setup:

    - name: Load OS-specific variables
      ansible.builtin.include_vars: "vars/{{ ansible_os_family }}.yml"
  # 必须通过 roles 关键字挂载你写的任务文件夹
  roles:
    - security          # 执行 SSH 安全加固与公钥部署
    - infrastructure    # 执行系统更新、BBR、Nginx、WebDAV、DDNS
    - application       # 执行 Aria2 安装
    - vpn               # 执行 Xray (VLESS+Reality) 安装与 SNI 分流配置

  tasks:
    - name: 打印部署状态
      ansible.builtin.debug:
        msg: "正在部署到 {{ domain }}，管理用户为 {{ web_user }}"
