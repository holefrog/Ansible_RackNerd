[defaults]
# --- 基础配置 ---
inventory            = hosts.yml
host_key_checking    = False
stdout_callback      = default
retry_files_enabled  = False
deprecation_warnings = False

# --- 性能优化 ---
timeout              = 30
forks                = 10

[ssh_connection]
# --- 极致加速 (核心部分) 与 SSH 修复 ---
pipelining = True
# IdentitiesOnly=yes: 强制仅使用指定密钥/密码，避免因尝试过多本地私钥导致 Too many authentication failures 报错
# UserKnownHostsFile=/dev/null: 强制不记录和检查本地 known_hosts，避免重装 VPS 或 IP 冲突导致指纹校验报错
ssh_args = -o ControlMaster=auto -o ControlPersist=300s -o IdentitiesOnly=yes -o UserKnownHostsFile=/dev/null
