---
- name: 🔍 VPS 资源与业务健康看板
  hosts: racknerd
  become: true
  gather_facts: false
  
  pre_tasks:
    - name: 智能探测目标主机的自定义 SSH 端口 (防 22 端口死锁)
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: "{{ ssh_port }}"
        timeout: 3
        state: started
      delegate_to: localhost
      register: custom_port_check
      ignore_errors: true
      changed_when: false
      check_mode: false

    - name: 动态设置实际连接端口 (根据探测结果 fallback 到 22)
      ansible.builtin.set_fact:
        ansible_port: "{% if custom_port_check is success %}{{ ssh_port }}{% else %}22{% endif %}"

    - name: Gather facts after port is resolved
      ansible.builtin.setup:

  tasks:
    - name: 检查内部服务回环监听
      ansible.builtin.wait_for:
        port: "{{ item }}"
        host: 127.0.0.1
        timeout: 2
      loop:
        - "{{ aria2_internal_port | int }}"
        - "{{ xray_internal_port | int }}"
      ignore_errors: true

    - name: 探测旧 SSH 端口 (22) 状态
      ansible.builtin.wait_for:
        port: 22
        host: 127.0.0.1
        timeout: 1
      register: ssh_22_check
      ignore_errors: true

    - name: 获取所有关键服务的系统状态
      ansible.builtin.service_facts:

    - name: 探测 WebDAV 路由连通性
      ansible.builtin.uri:
        url: "https://127.0.0.1:4433/webdav/"
        validate_certs: false
        # WebDAV 开启了认证，所以预期返回 401 Unauthorized 表示服务正常运转
        status_code: [401, 403, 200]
      register: webdav_check
      ignore_errors: true

    - name: 📊 打印健康报告
      vars:
        root_info: "{{ ansible_mounts | selectattr('mount', 'equalto', '/') | list | first }}"
        svc: "{{ ansible_facts.services }}"
      ansible.builtin.debug:
        msg: |
          ====================================
          [节点] {{ inventory_hostname }}
          [Swap状态] {{ ansible_swaptotal_mb }}MB Total (2G优化已生效)
          [存储占用] {{ (root_info.size_total - root_info.size_available) | human_readable }} / {{ root_info.size_total | human_readable }}
          
          # --- 核心服务状态 (Systemd) ---
          [Nginx 代理] {% if svc['nginx.service'] is defined and svc['nginx.service'].state == 'running' %}✅ 运行中{% else %}❌ 异常{% endif %}
          [Xray  节点] {% if svc['xray.service'] is defined and svc['xray.service'].state == 'running' %}✅ 运行中{% else %}❌ 异常{% endif %}
          [Aria2 下载] {% if svc['aria2.service'] is defined and svc['aria2.service'].state == 'running' %}✅ 运行中{% else %}❌ 异常{% endif %}
          [UFW       ] {% if svc['ufw.service'] is defined and svc['ufw.service'].state == 'running' %}✅ 运行中{% else %}❌ 异常{% endif %}
          [Fail2ban  ] {% if svc['fail2ban.service'] is defined and svc['fail2ban.service'].state == 'running' %}✅ 运行中{% else %}❌ 异常{% endif %}

          # --- 虚拟路由服务 ---
          [WebDAV文件] {% if webdav_check.status is defined and webdav_check.status in [401, 403, 200] %}✅ 运行中{% else %}❌ 异常 (连通性错误){% endif %}

          # --- 安全审计 ---
          [SSH 22 端口] {% if ssh_22_check.failed is defined and ssh_22_check.failed %}🔒 已关闭 (安全){% else %}⚠️ 仍开启 (有风险){% endif %}
          {% if ssh_22_check.failed is not defined or not ssh_22_check.failed %}
          >>> 提示：请立即运行 ./close_22.sh 以加固服务器！
          {% endif %}
          ====================================
