---
- name: 确保安装 UFW
  ansible.builtin.apt:
    name: ufw
    state: present

- name: 显式确保 22 端口在部署期间保持开启 (防止自锁)
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp

- name: 放行基础业务端口与自定义 SSH 端口
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - '80'
    - '443'
    - "{{ ssh_port }}"

- name: 配置 UFW 默认策略并启用
  community.general.ufw:
    state: enabled
    default: deny
    direction: incoming
