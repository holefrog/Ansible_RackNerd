---
- name: Reload nginx
  ansible.builtin.systemd:
    name: nginx
    state: reloaded
- name: Restart aria2
  ansible.builtin.systemd:
    name: aria2
    state: restarted
    daemon_reload: true

- name: 重启 yattee-server
  ansible.builtin.command:
    cmd: docker compose up -d --build
    chdir: "{{ yattee_install_dir }}"
  changed_when: false
